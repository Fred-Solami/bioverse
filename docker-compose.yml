services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: bioverse
      POSTGRES_PASSWORD: bioverse
      POSTGRES_DB: bioverse
    ports:
      - "5433:5432" # host 5433 to avoid clashing with a local PostgreSQL on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioverse -d bioverse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://bioverse:bioverse@postgres:5432/bioverse
      REDIS_URL: redis://redis:6379
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
