name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      # The dev machine cannot run PostGIS (docs/PLAN.md constraint #1), so CI
      # is where migrations and the full v0.1 lifecycle are actually proven.
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: bioverse
          POSTGRES_PASSWORD: bioverse
          POSTGRES_DB: bioverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bioverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://bioverse:bioverse@localhost:5432/bioverse
      JWT_SECRET: ci-only-secret
      E2E: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit, inject, and lifecycle tests
        run: npm test
