name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      # The dev machine cannot run PostGIS (docs/PLAN.md constraint #1), so CI
      # is where migrations and the full v0.1 lifecycle are actually proven.
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: bioverse
          POSTGRES_PASSWORD: bioverse
          POSTGRES_DB: bioverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bioverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://bioverse:bioverse@localhost:5432/bioverse
      JWT_SECRET: ci-only-secret
      E2E: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit, inject, and lifecycle tests
        run: npm test

  # Facility PWA (v0.3): typecheck + production build (which generates the
  # service worker). Playwright offline e2e is added in Slice 6 (docs/PWA-PLAN.md).
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-facility
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client-facility/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build (generates service worker)
        run: npm run build

  # Authoritative FHIR R4 conformance: the resources BioVerse emits to the HIE
  # are validated against the spec by HL7's official validator (docs/PLAN.md
  # Step 3). If a mapper drifts out of conformance, this job goes red.
  fhir-conformance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Emit sample FHIR resources from the mappers
        run: npm run fhir:samples -- ./fhir-samples

      - name: Download HL7 FHIR validator
        run: curl -sL -o validator_cli.jar https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar

      # -tx n/a: validate structure offline. Local code systems (bioverse.zm)
      # can't be checked against a terminology server and would only produce
      # informational notes; structural non-conformance still fails the run.
      - name: Validate against FHIR R4
        run: java -jar validator_cli.jar fhir-samples -version 4.0 -tx n/a
